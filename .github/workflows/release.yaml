name: Build and Release
on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-meta.outputs.release_tag }}
      release_name: ${{ steps.release-meta.outputs.release_name }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-meta
        shell: bash
        run: |
          VERSION=$(grep 'Version' FyneApp.toml | sed 's/Version = "\(.*\)"/\1/' | xargs)
          BUILD=$(grep 'Build' FyneApp.toml | sed 's/Build = \(.*\)/\1/' | xargs)

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v${VERSION}.${BUILD}.${GITHUB_RUN_NUMBER}"
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        if: github.ref_type != 'tag'
        env:
          RELEASE_TAG: ${{ steps.release-meta.outputs.release_tag }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | grep -q .; then
            echo "Release tag ${RELEASE_TAG} already exists on origin"
            exit 0
          fi

          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

  build:
    needs: prepare-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: 'ubuntu'
          - os: windows-latest
            label: 'windows'
          - os: macos-latest
            label: 'macos-arm'
          - os: macos-15-intel
            label: 'macos-x86'

    runs-on: ${{ matrix.os }}
    env:
      LPAC_VERSION: v2.2.1
      LPAC_VERSION_IN_URL: v2.2.1
      LPAC_REPO: https://github.com/estkme-group/lpac
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Modify version number
        run: |
          VERSION=$(grep 'Version' FyneApp.toml | sed 's/Version = "\(.*\)"/\1/' | xargs)
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/const Version = \"development\"/const Version = \"$VERSION\"/" internal/easylpac/app.go
          else
            sed -i "s/const Version = \"development\"/const Version = \"$VERSION\"/" internal/easylpac/app.go
          fi
        shell: bash

      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24'

      - name: Setup toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev xorg-dev libgtk-3-dev

      - name: Setup msys2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          install: git mingw-w64-x86_64-toolchain wget zip unzip
          path-type: inherit

      - name: Build for Linux
        if: runner.os == 'Linux'
        run: |
          go build -ldflags="-s -w" -o EasyLPAC ./cmd/easylpac
          wget $LPAC_REPO/releases/download/$LPAC_VERSION_IN_URL/lpac-linux-x86_64.zip -O lpac.zip
          unzip lpac.zip && rm lpac.zip
          wget $LPAC_REPO/archive/refs/tags/$LPAC_VERSION_IN_URL.tar.gz -O lpac-$LPAC_VERSION-src.tar.gz
          chmod +x EasyLPAC lpac
          tar zcf EasyLPAC-linux-x86_64-with-lpac.tar.gz EasyLPAC lpac lpac-$LPAC_VERSION-src.tar.gz LICENSE LICENSE-lpac
          tar zcf EasyLPAC-linux-x86_64.tar.gz EasyLPAC lpac-$LPAC_VERSION-src.tar.gz LICENSE LICENSE-lpac

      - name: Build for Windows
        if: runner.os == 'Windows'
        run: |
          VERSION=$(grep 'Version' FyneApp.toml | sed 's/Version = "\(.*\)"/\1/' | xargs)
          BUILD=$(grep 'Build' FyneApp.toml | sed 's/Build = \(.*\)/\1/' | xargs)
          go install fyne.io/tools/cmd/fyne@latest
          cd cmd/easylpac
          fyne package --executable EasyLPAC.exe --icon "$GITHUB_WORKSPACE/assets/icon64.png" --name EasyLPAC --appID github.creamlike1024.EasyLPAC --appVersion "$VERSION" --appBuild "$BUILD"
          cd ../..
          mkdir easylpac && cp cmd/easylpac/EasyLPAC.exe easylpac && cd easylpac
          wget $LPAC_REPO/releases/download/$LPAC_VERSION_IN_URL/lpac-windows-x86_64-mingw.zip -O lpac.zip
          unzip lpac.zip && rm lpac.zip
          rm LICENSE* *.md
          wget $LPAC_REPO/archive/refs/tags/$LPAC_VERSION_IN_URL.zip -O lpac-$LPAC_VERSION-src.zip
          wget $LPAC_REPO/raw/main/src/LICENSE -O LICENSE-lpac
          cp ../LICENSE ./
          zip -r ../EasyLPAC-windows-x86_64-with-lpac.zip ./*
        shell: msys2 {0}

      - name: Build for macOS ARM
        if: matrix.label == 'macos-arm'
        run: |
          VERSION=$(grep 'Version' FyneApp.toml | sed 's/Version = "\(.*\)"/\1/' | xargs)
          BUILD=$(grep 'Build' FyneApp.toml | sed 's/Build = \(.*\)/\1/' | xargs)
          go install fyne.io/tools/cmd/fyne@latest
          go build -ldflags="-s -w" -o EasyLPAC ./cmd/easylpac
          fyne package --executable EasyLPAC --icon assets/icon128.png --name EasyLPAC --appID github.creamlike1024.EasyLPAC --appVersion "$VERSION" --appBuild "$BUILD" --release
          cd EasyLPAC.app/Contents/MacOS
          wget $LPAC_REPO/releases/download/$LPAC_VERSION_IN_URL/lpac-darwin-universal.zip -O lpac.zip
          unzip lpac.zip && rm lpac.zip
          rm LICENSE* *.md
          cd $GITHUB_WORKSPACE
          wget $LPAC_REPO/archive/refs/tags/$LPAC_VERSION_IN_URL.zip -O lpac-$LPAC_VERSION-src.zip
          wget $LPAC_REPO/raw/main/src/LICENSE -O LICENSE-lpac
          zip -r EasyLPAC-macOS-arm64-with-lpac.zip EasyLPAC.app lpac-$LPAC_VERSION-src.zip LICENSE*

      - name: Build for macOS x86
        if: matrix.label == 'macos-x86'
        run: |
          VERSION=$(grep 'Version' FyneApp.toml | sed 's/Version = "\(.*\)"/\1/' | xargs)
          BUILD=$(grep 'Build' FyneApp.toml | sed 's/Build = \(.*\)/\1/' | xargs)
          go install fyne.io/tools/cmd/fyne@latest
          go build -ldflags="-s -w" -o EasyLPAC ./cmd/easylpac
          fyne package --executable EasyLPAC --icon assets/icon128.png --name EasyLPAC --appID github.creamlike1024.EasyLPAC --appVersion "$VERSION" --appBuild "$BUILD" --release
          cd EasyLPAC.app/Contents/MacOS
          wget $LPAC_REPO/releases/download/$LPAC_VERSION_IN_URL/lpac-darwin-universal.zip -O lpac.zip
          unzip lpac.zip && rm lpac.zip
          rm LICENSE* *.md
          cd $GITHUB_WORKSPACE
          wget $LPAC_REPO/archive/refs/tags/$LPAC_VERSION_IN_URL.zip -O lpac-$LPAC_VERSION-src.zip
          wget $LPAC_REPO/raw/main/src/LICENSE -O LICENSE-lpac
          zip -r EasyLPAC-macOS-x86_64-with-lpac.zip EasyLPAC.app lpac-$LPAC_VERSION-src.zip LICENSE*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.label }}
          path: |
            EasyLPAC-windows-x86_64-with-lpac.zip
            EasyLPAC-macOS-arm64-with-lpac.zip
            EasyLPAC-macOS-x86_64-with-lpac.zip
            EasyLPAC-linux-x86_64-with-lpac.tar.gz
            EasyLPAC-linux-x86_64.tar.gz

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          generate_release_notes: true
          files: |
            EasyLPAC-windows-x86_64-with-lpac.zip
            EasyLPAC-macOS-arm64-with-lpac.zip
            EasyLPAC-macOS-x86_64-with-lpac.zip
            EasyLPAC-linux-x86_64-with-lpac.tar.gz
            EasyLPAC-linux-x86_64.tar.gz
